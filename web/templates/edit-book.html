{% extends "base.html" %}
{% block title %}Athenaeum — Edit book{% endblock %}

{% block content %}
  <section class="form-card">
    <h1>Edit book</h1>
    <form method="post" action="{{ url_for('edit_book', book_id=book.id) }}" enctype="multipart/form-data">
      <label>
        Title
        <input type="text" name="title" required value="{{ book.title }}">
      </label>
      <label>
        Author
        <input type="text" name="author" value="{{ book.author or '' }}">
      </label>
      <label>
        ISBN <span class="optional">(optional — used to fetch a cover if you don't upload one)</span>
        <input type="text" name="isbn" value="{{ book.isbn or '' }}">
      </label>
      <label>
        Cover image
        {% if book.cover_filename %}
          <span class="optional">(currently set — choose a new file to replace it)</span>
        {% else %}
          <span class="optional">(optional)</span>
        {% endif %}
        {% if book.cover_filename %}
          <img class="cover-preview" src="{{ url_for('static', filename='covers/' + book.cover_filename) }}" alt="">
        {% endif %}
        <input type="file" name="cover" accept="image/png, image/jpeg, image/webp, image/gif">
      </label>
      {% if book.cover_filename %}
      <label class="checkbox-row">
        <input type="checkbox" name="remove_cover" value="1">
        Remove current cover
      </label>
      {% endif %}
      <label>
        Status
        <select name="status">
          <option value="want-to-read" {{ 'selected' if book.status == 'want-to-read' }}>Want to read</option>
          <option value="reading" {{ 'selected' if book.status == 'reading' }}>Reading</option>
          <option value="read" {{ 'selected' if book.status == 'read' }}>Read</option>
        </select>
      </label>
      <label>
        Rating
        <select name="rating">
          <option value="">Unrated</option>
          {% for i in range(1, 6) %}
            <option value="{{ i }}" {{ 'selected' if book.rating == i }}>{{ i }} star{{ 's' if i > 1 }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Tags <span class="optional">(comma-separated)</span>
        <input type="text" name="tags" value="{{ tags }}" placeholder="sci-fi, favorites">
      </label>
      <div class="form-actions">
        <button type="submit" class="primary-btn">Save changes</button>
        <a href="{{ url_for('index') }}" class="cancel-link">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
